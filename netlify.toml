[build]
  base = "admin-dashboard"
  publish = "dist"
  command = "npm run build"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "dist/**/*.js, node_modules/**"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"


[[redirects]]
  from = "/api/resend/*"
  to = "https://api.resend.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
